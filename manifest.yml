permissions:
  scopes:
    - read:confluence-props
    - write:confluence-props
    - read:confluence-content.summary
    - storage:app
    - read:jira-work
    - write:jira-work
    - read:jira-user

modules:
  macro:
    - key: responsive-gantt-macro
      resource: main
      resolver:
        function: resolver
      title: Gantt
      description: Enterprise Gantt chart for Confluence — phases, critical path, Jira integration.
      parameters:
        - key: tasksJson
          type: string
          defaultValue: "[]"

  jira:projectPage:
    - key: gantt-jira-project-page
      resource: main
      resolver:
        function: resolver
      title: Gantt
      description: Gantt chart for your Jira project — issues, critical path, timeline.

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/gantt-app/dist

app:
  id: ari:cloud:ecosystem::app/ee93d8d1-e332-4275-b266-e8a75ebfeede
  runtime:
    name: nodejs22.x
