permissions:
  scopes:
    - read:confluence-props
    - write:confluence-props
    - read:confluence-content.summary
    - storage:app
    - read:jira-work
    - read:jira-user

modules:
  macro:
    - key: responsive-gantt-macro
      resource: main
      resolver:
        function: resolver
      title: Gantt
      description: Enterprise Gantt chart for Confluence — phases, critical path, Jira integration.
      parameters:
        - key: tasksJson
          type: string
          defaultValue: "[]"

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/gantt-app/dist

app:
  id: ari:cloud:ecosystem::app/0b1010f4-429b-4110-8d4d-cb3c93135f9e
  runtime:
    name: nodejs22.x
