permissions:
  scopes:
    - read:confluence-props
    - write:confluence-props
    - read:confluence-content.summary
    - storage:app

modules:
  macro:
    - key: responsive-gantt-macro
      resource: main
      resolver:
        function: resolver
      title: Syngenta Gantt
      description: Enterprise Gantt intelligence for Syngenta strategic roadmaps.
      parameters:
        - key: tasksJson
          type: string
          defaultValue: "[]"
      config:
        resource: main

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: main
    path: static/gantt-app/dist

app:
  id: ari:cloud:ecosystem::app/0b1010f4-429b-4110-8d4d-cb3c93135f9e
  runtime:
    name: nodejs20.x
